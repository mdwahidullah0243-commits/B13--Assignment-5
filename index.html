<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title and favicon -->
    <title>Login Page || GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-icon-1.png" type="image/x-icon">

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./style/styleUI.css">

    <!-- daisyUI and Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen max-w-md mx-auto 
        bg-white 
        shadow-md 
        rounded-xl 
        my-10
        p-8
    ">

    <section class="space-y-7">

        <!-- Part: 1 -->
        <div class="text-center space-y-4">
            <img class="mx-auto" src="./assets/github-logo.png" alt="">

            <div>
                <h2 class="text-[#1F2937] text-2xl font-semibold">
                    GitHub Issues Tracker
                </h2>
                <p class="text-[#64748B] text-base font-normal">
                    Sign in to manage your issues
                </p>
            </div>
        </div>

        <!-- Part: 2 => form -->
        <div class="space-y-5">

            <!-- Username -->
            <div class="space-y-2">
                <label class="block text-[#1F2937] text-lg font-semibold">Username</label>
                <input id="username-input" type="text" placeholder="Enter Username"
                    class="block btn cursor-text text-left w-full text-[#2a2d33] text-base font-medium p-3 rounded-xl">
                <p class="text-[#4A00FF] font-normal">Default: admin</p>
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <label class="block text-[#1F2937] text-lg font-semibold">Password</label>
                <input id="password-input" type="password" placeholder="Enter Password"
                    class="block btn cursor-text text-left w-full text-[#2a2d33] text-base font-medium p-3 rounded-xl">
                <p class="text-[#4A00FF] font-normal">Default: admin123</p>
            </div>

            <!-- Sign In button -->
            <button id="login-btn" class="btn btn-primary w-full text-lg">
                Sign In
            </button>
        </div>

        <!-- Part: 3 -->
        <div class="grid grid-cols-12 items-center">
            <span class="border-t border-t-[#b8b8b8] col-span-5"></span>
            <span class="col-span-2 text-center">OR</span>
            <span class="border-t border-t-[#b8b8b8] col-span-5"></span>
        </div>

        <!-- Part: 4 -->
        <div class="text-center space-y-2">
            <h3 class="text-[#2a2d33] text-lg font-normal">Demo Credentials:</h3>

            <div class="text-[#1F2937] font-normal bg-[#F8FAFC] rounded-lg py-8">
                <p class="">
                    <span class="text-lg font-semibold">Username:</span> admin
                </p>
                <p>
                    <span class="text-lg font-semibold">Password:</span> admin123
                </p>
            </div>
        </div>

    </section>


    <script src="./machine.js"></script>
    <script src="./login.js"></script>

</body>

</html>
